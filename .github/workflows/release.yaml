name: Release

# Tag-triggered release. Pushing a `v*` tag runs the full gate on every supported
# platform (per-PR CI is ubuntu-only; a release is the moment to pay for the rest), cuts
# a GitHub Release with the packaged `.crate` + its SHA256 attached, and — on a FINAL
# tag only — publishes to crates.io.
#
# Pre-release tags (vX.Y.Z-rc.N, -alpha, …) are marked as GitHub pre-releases and skip
# the crates.io publish; only final tags publish.
#
# Publishing uses Trusted Publishing (OIDC, no stored token) on both registries.
# crates.io publishes through the `crates-io` environment, registered as a trusted
# publisher on the crate (the crate's first version was published by hand, since
# crates.io cannot attach a publisher to a name that does not exist yet; the publish
# step's already-exists skip tolerates that bootstrapped version). PyPI publishes the
# bindings wheels through the `pypi` environment, registered as a trusted publisher
# on the `ruffle` project (PyPI supports registering one before the first release,
# as a pending publisher). npm publishes the TypeScript package through the `npm`
# environment, registered as a trusted publisher on `@lathrys-at/ruffle`, with
# provenance attached. Every binding's version is the corresponding crate version,
# which the verify job asserts equals the tag.
on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  # The full CI gate, on every supported platform. PRs run ubuntu-only; a release must
  # be green everywhere before we publish. Lints/docs/version-check run once (Linux);
  # the test suite runs on each platform. Always --all-features so the cli-gated binary
  # and its process tests are part of the gate.
  verify:
    name: Verify (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: Tag matches Cargo.toml version
        if: runner.os == 'Linux'
        run: |
          tag="${GITHUB_REF_NAME#v}"
          ver="$(cargo metadata --no-deps --format-version 1 \
            | jq -r '.packages[] | select(.name=="ruffle").version')"
          if [ "$tag" != "$ver" ]; then
            echo "::error::tag v$tag does not match Cargo.toml version $ver"
            exit 1
          fi
          # Version lockstep: every binding always wraps the engine version it
          # releases with, so each binding's version must equal the crate version.
          pyver="$(cargo metadata --no-deps --format-version 1 \
            | jq -r '.packages[] | select(.name=="ruffle-py").version')"
          if [ "$tag" != "$pyver" ]; then
            echo "::error::tag v$tag does not match ruffle-py version $pyver"
            exit 1
          fi
          wasmver="$(cargo metadata --no-deps --format-version 1 \
            | jq -r '.packages[] | select(.name=="ruffle-wasm").version')"
          if [ "$tag" != "$wasmver" ]; then
            echo "::error::tag v$tag does not match ruffle-wasm version $wasmver"
            exit 1
          fi
          npmver="$(jq -r .version bindings/wasm/package.json)"
          if [ "$tag" != "$npmver" ]; then
            echo "::error::tag v$tag does not match the npm package version $npmver"
            exit 1
          fi
      - name: Format
        if: runner.os == 'Linux'
        run: cargo fmt --all --check
      - name: Clippy
        if: runner.os == 'Linux'
        run: cargo clippy --all-targets --all-features -- -D warnings
      - name: Test
        run: cargo test --verbose --all-features
      - name: Doc
        if: runner.os == 'Linux'
        run: cargo doc --no-deps --all-features
        env:
          RUSTDOCFLAGS: "-D warnings"

  # Create the GitHub Release (all tags) with the packaged crate + checksum attached.
  # Notes come from the matching CHANGELOG.md section for a final release, else they
  # are auto-generated from commits.
  release:
    name: GitHub Release
    needs: verify
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Package the crate
        run: cargo package --locked
      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          tag="$GITHUB_REF_NAME"
          version="${tag#v}"

          # Idempotent, like the crates.io publish below: a duplicate tag-push event or
          # a job re-run must not fail on the release the first run already created.
          if gh release view "$tag" >/dev/null 2>&1; then
            echo "::notice::release $tag already exists, skipping"
            exit 0
          fi

          # A SemVer pre-release identifier (the hyphen in v0.1.0-rc.1) marks this as a
          # GitHub pre-release.
          prerelease=""
          [[ "$version" == *-* ]] && prerelease="--prerelease"

          # Curated notes: the "## [VERSION]" section of CHANGELOG.md up to the next
          # "## " heading, if the file and section exist; otherwise auto-generate from
          # commits.
          notes="--generate-notes"
          if [[ -z "$prerelease" && -f CHANGELOG.md ]]; then
            awk -v hdr="## [$version]" '
              index($0, hdr) == 1 { capture = 1; next }
              capture && /^## / { exit }
              capture { print }
            ' CHANGELOG.md > notes.md
            sed -i -e '/./,$!d' notes.md
            [[ -s notes.md ]] && notes="--notes-file notes.md"
          fi

          crate="target/package/ruffle-${version}.crate"
          sha256sum "$crate" > "$crate.sha256"
          gh release create "$tag" "$crate" "$crate.sha256" --title "$tag" $prerelease $notes

  # Build the Python wheels for every supported platform, plus the sdist. The wheels
  # are abi3, one per platform and architecture for CPython 3.10 and later.
  wheels:
    name: Wheels (${{ matrix.platform.name }})
    needs: verify
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          - { name: linux-x86_64, runner: ubuntu-latest, target: x86_64 }
          - { name: linux-aarch64, runner: ubuntu-latest, target: aarch64 }
          - { name: macos-x86_64, runner: macos-13, target: x86_64 }
          - { name: macos-arm64, runner: macos-latest, target: aarch64 }
          - { name: windows-x64, runner: windows-latest, target: x64 }
          - { name: windows-arm64, runner: windows-11-arm, target: aarch64 }
    steps:
      - uses: actions/checkout@v4
      - uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.platform.target }}
          args: --release --locked --out dist --manifest-path bindings/python/Cargo.toml
          manylinux: auto
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.platform.name }}
          path: dist

  # The sdist is also install-tested here: it is a maturin-vendored copy of a Cargo
  # workspace member with a path dependency on the workspace root, the layout where
  # a vendored tarball most often stops building, so the exact artifact that
  # publishes is the one proven to compile and pass the suites.
  sdist:
    name: Wheels (sdist)
    needs: verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist --manifest-path bindings/python/Cargo.toml
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-sdist
          path: dist
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install from the sdist
        run: python -m pip install dist/*.tar.gz
      - name: Test the installed package
        run: |
          python -m pip install pytest
          # The tests must exercise the installed artifact, not the repo source.
          python -c "import ruffle; assert 'site-packages' in ruffle.__file__, ruffle.__file__"
          python -m pytest bindings/python/tests/test_parity.py bindings/python/tests/test_api.py -q

  # Every wheel is imported and exercised on its native platform and architecture
  # before PyPI sees it, on the CPython floor and the newest supported version. The
  # parity replay against the installed wheel is the same bit-exactness gate the
  # per-PR suite runs; the wheels themselves are what publish-pypi uploads.
  wheel-smoke:
    name: Wheel smoke (${{ matrix.platform.name }}, ${{ matrix.python }})
    needs: wheels
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          - { name: linux-x86_64, runner: ubuntu-latest }
          - { name: linux-aarch64, runner: ubuntu-24.04-arm }
          - { name: macos-x86_64, runner: macos-13 }
          - { name: macos-arm64, runner: macos-latest }
          - { name: windows-x64, runner: windows-latest }
          - { name: windows-arm64, runner: windows-11-arm }
        python: ["3.10", "3.14"]
        # CPython publishes Windows-on-ARM builds from 3.11, so that platform's
        # floor leg smokes 3.11 in place of 3.10; the abi3-py310 wheel itself
        # installs on any 3.10+ interpreter the platform has.
        exclude:
          - platform: { name: windows-arm64, runner: windows-11-arm }
            python: "3.10"
        include:
          - platform: { name: windows-arm64, runner: windows-11-arm }
            python: "3.11"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
      - uses: actions/download-artifact@v4
        with:
          name: wheels-${{ matrix.platform.name }}
          path: dist
      - name: Install the wheel
        shell: bash
        run: python -m pip install --no-index --find-links dist ruffle
      - name: Test against the installed wheel
        shell: bash
        run: |
          python -m pip install pytest
          # The tests must exercise the installed wheel, not the repo source.
          python -c "import ruffle; assert 'site-packages' in ruffle.__file__, ruffle.__file__"
          python -m pytest bindings/python/tests/test_parity.py bindings/python/tests/test_api.py -q

  # The TypeScript suite as a release gate, on every tag: the wasm artifact is
  # built and the full vitest suite (parity replay, idiomatic tests, the tsc gate,
  # packaging assertions, and the Rust-CLI interop round trip) runs against it,
  # mirroring the wheel-smoke gate on the Python side.
  typescript:
    name: TypeScript suite
    needs: verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
      - name: Build
        working-directory: bindings/wasm
        run: |
          npm ci
          npm run build
      - name: Test
        working-directory: bindings/wasm
        run: npm test

  # Build and publish the npm package on a final tag, via npm Trusted Publishing
  # (OIDC, with provenance) through the `npm` environment, registered as a trusted
  # publisher on the @lathrys-at/ruffle package. The vitest suite runs here too,
  # against the exact build being published, so nothing ships that the tests never
  # touched. The existence probe makes a re-run or duplicate tag-push event skip
  # rather than fail, like the other publishes.
  publish-npm:
    name: Publish to npm
    needs: [verify, typescript]
    if: ${{ !contains(github.ref_name, '-') }}
    runs-on: ubuntu-latest
    environment: npm
    permissions:
      contents: read
      id-token: write # mint the OIDC token npm Trusted Publishing verifies
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
      - name: Build
        working-directory: bindings/wasm
        run: |
          npm ci
          npm run build
      - name: Test the artifact being published
        working-directory: bindings/wasm
        run: npm test
      - name: Publish
        working-directory: bindings/wasm
        run: |
          set -euo pipefail
          version="$(jq -r .version package.json)"
          if npm view "@lathrys-at/ruffle@${version}" version >/dev/null 2>&1; then
            echo "::notice::@lathrys-at/ruffle@${version} is already on npm — skipping"
            exit 0
          fi
          npm publish --provenance --access public

  # Publish the wheels to PyPI on a final tag, via PyPI's Trusted Publishing (OIDC).
  # skip-existing makes this idempotent, like the crates.io publish below: a
  # duplicate tag-push event or a job re-run must not fail on files the first run
  # already uploaded.
  publish-pypi:
    name: Publish to PyPI
    needs: [wheels, sdist, wheel-smoke]
    if: ${{ !contains(github.ref_name, '-') }}
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      contents: read
      id-token: write # mint the OIDC token PyPI Trusted Publishing verifies
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          merge-multiple: true
          path: dist
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
          skip-existing: true

  # Publish to crates.io on a final tag, via Trusted Publishing (OIDC) — no stored
  # token. Skipped for pre-release (rc/alpha) tags, which carry a SemVer hyphen.
  publish:
    name: Publish to crates.io
    needs: verify
    if: ${{ !contains(github.ref_name, '-') }}
    runs-on: ubuntu-latest
    environment: crates-io
    permissions:
      contents: read
      id-token: write # mint the OIDC token crates.io Trusted Publishing verifies
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Authenticate with crates.io
        uses: rust-lang/crates-io-auth-action@v1
        id: auth
      - name: Publish
        # Idempotent via cargo's own sparse-index check: a version already on crates.io
        # makes `cargo publish` exit with "already exists", which we treat as a skip;
        # any other failure fails the job. This tolerates a re-run and the one-time
        # hand-bootstrap of a brand-new crate name (which Trusted Publishing cannot
        # first-publish). We rely on cargo's index check, NOT the crates.io web API —
        # the latter's User-Agent policy makes an HTTP existence probe unreliable.
        run: |
          set -uo pipefail
          set +e   # we handle cargo's exit status ourselves
          out="$(cargo publish --locked 2>&1)"
          status=$?
          echo "$out"
          if [ "$status" -eq 0 ]; then
            echo "::notice::published ruffle"
          elif echo "$out" | grep -qiE 'already (exists|uploaded)'; then
            echo "::notice::this version is already on crates.io — skipping"
          else
            echo "::error::publish failed (exit $status)"
            exit 1
          fi
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
