# Compatibility matrix: every supported CPython version, floor first. The floor is
# the lowest version still receiving security updates; when a version drops out of
# security support, it leaves this envlist together with the abi3 floor in
# Cargo.toml, requires-python, and the classifiers in pyproject.toml.
#
# tox-uv provisions any interpreter missing from the host, so `tox` runs the whole
# matrix locally; CI runs one env per matrix leg.

[tox]
requires =
    tox>=4.22
    tox-uv>=1.13
envlist = py310, py311, py312, py313, py314, lint

[testenv]
package = wheel
deps =
    mypy>=1.14
    pytest>=8
commands =
    pytest -q {posargs}

[testenv:lint]
skip_install = true
deps = ruff>=0.8
commands =
    ruff check python tests
    ruff format --check python tests
